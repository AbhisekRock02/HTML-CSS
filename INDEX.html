<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templet for Student Details </title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        caption {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>
    <table>
        <caption>This Is Student Details Table</caption>
        <thead>
            <tr>
                <th>Sl No</th>
                <th>Name of Inistitution</th>
                <th>Percentage/CGPA</th>
                <th>Pass Year</th>
                <th>Inistitution Location</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>01</td>
                <td>XYZ SCHOOL</td>
                <td>85%</td>
                <td>2020</td>
                <td>DELHI</td>
            </tr>
            <tr>
                <td>02</td>
                <td>ABC COLLEGE</td>
                <td>8.5 CGPA</td>
                <td>2022</td>
                <td>DELHI</td>
            </tr>
            <tr>
                <td>03</td>
                <td>DEF UNIVERSITY</td>
                <td>9.0 CGPA</td>
                <td>2024</td>
                <td>DELHI</td>
            </tr>
        </tbody>
        <tfoot>
            <tr><td colspan="5"><strong>This Certificate is Issued by Delhi Education Ministry Valid till 2026 june</strong></td></tr>
        </tfoot>
    </table>
</body>
</html>
